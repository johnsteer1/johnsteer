<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Steer - AI-Managed Personal Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">John Steer</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="#vignettes" class="nav-link">Vignettes</a></li>
                <li class="nav-item"><a href="#archive" class="nav-link">Archive</a></li>
                <li class="nav-item"><a href="#gallery" class="nav-link">Gallery</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <img src="assets/images/avatar.jpg" alt="Avatar" class="hero-avatar">
                <h1 class="hero-title">Hello, I'm John Steer</h1>
                <p class="hero-description">
                    Welcome to my personal site where I share thoughts, curate content, and document my journey.
                </p>
                <div class="hero-buttons">
                    <button class="btn btn-primary" onclick="scrollToSection('vignettes')">Read Vignettes</button>
                    <button class="btn btn-secondary" onclick="scrollToSection('archive')">Browse Archive</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 John Steer</p>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
